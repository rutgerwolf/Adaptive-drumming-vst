name: CI

on:
  # Branch work is validated via the pull_request event, so only build the push
  # for main (avoids a duplicate run for every push to an open PR's branch).
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VST3_REL: AdaptiveDrummer_artefacts/Release/VST3/Adaptive Drummer.vst3
  PLUGINVAL_ARGS: --strictness-level 10 --random-seed 1 --validate-in-process

jobs:
  linux:
    name: Linux · build, tests & pluginval
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with JUCE submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install JUCE build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfreetype-dev libfontconfig1-dev libx11-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxcursor-dev libxcomposite-dev \
            libasound2-dev libgl1-mesa-dev ninja-build xvfb

      - name: Cache compiled objects (ccache)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DADAPTIVE_DRUMMER_BUILD_TESTS=ON
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build (plugin + tests)
        run: cmake --build build --parallel

      - name: Run unit tests
        run: xvfb-run -a ctest --test-dir build --output-on-failure

      - name: Validate VST3 (pluginval)
        run: |
          curl -fsSL https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Linux.zip -o pluginval.zip
          unzip -o pluginval.zip
          chmod +x pluginval
          xvfb-run -a ./pluginval $PLUGINVAL_ARGS --validate "build/$VST3_REL"

  windows:
    name: Windows · build, tests & pluginval
    # Pinned: needs the VS 2022 generator used below (and in the README).
    runs-on: windows-2022

    steps:
      - name: Checkout (with JUCE submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DADAPTIVE_DRUMMER_BUILD_TESTS=ON

      - name: Build (plugin + tests)
        run: cmake --build build --config Release --parallel

      - name: Run unit tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Validate VST3 (pluginval)
        shell: pwsh
        run: |
          curl.exe -L https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip -o pluginval.zip
          Expand-Archive pluginval.zip -DestinationPath pluginval_dir -Force
          $pv = (Get-ChildItem -Recurse pluginval_dir -Filter pluginval.exe | Select-Object -First 1).FullName
          & $pv --strictness-level 10 --random-seed 1 --validate-in-process --skip-gui-tests --validate "build/$env:VST3_REL"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
